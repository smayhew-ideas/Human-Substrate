<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Human Substrate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #080807;
  font-family: 'Inter', sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* MAYHEW */
#mayhew {
  position: fixed;
  top: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Inter', sans-serif;
  font-size: clamp(18px, 3vw, 28px);
  font-weight: 100;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  z-index: 10;
  pointer-events: none;
}

/* ENTER */
#enter-zone {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 10;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 3s ease 2s forwards;
}

#enter-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  background: none;
  border: none;
  cursor: pointer;
  transition: color 0.4s ease;
  padding: 8px 0;
}

#enter-btn:hover { color: rgba(255,255,255,0.8); }

.enter-line {
  width: 1px;
  height: 32px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15));
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* EXIT TRANSITION */
body.exiting {
  transition: opacity 1.2s ease;
  opacity: 0;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="mayhew">Mayhew</div>

<div id="enter-zone" onclick="enterLetter()">
  <div class="enter-line"></div>
  <button id="enter-btn">enter the letter</button>
</div>

<script>
// ============================================
// FRAGMENTS
// ============================================
const FRAGMENTS = [
  "I learned patience at the stove",
  "she wore copper wire in her hair",
  "the light through that window",
  "the map was always wrong",
  "his hands knew the machine",
  "the last time I saw rain",
  "the frequency of her laugh",
  "Corsair began in a notebook",
  "three blocks from the water",
  "the coffee was always",
  "the summer the grid failed",
  "the diagram on the napkin",
  "one thing at a time",
  "the dog knew before we did",
  "I can still taste that smoke",
  "her voice through the static",
  "the loop has to close",
  "I thought the matterhorn was a cloud",
  "we travelled to Italy by ship",
  "the name came to me",
  "slept in the cab",
  "I thought I knew her",
];

// ============================================
// CANVAS SETUP
// ============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, sphereR;
let fragments = [];
let animId;
let t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  sphereR = Math.min(W, H) * 0.14;
  initFragments();
}

// ============================================
// FRAGMENT OBJECTS
// ============================================
function initFragments() {
  // Measure text widths
  ctx.font = '300 14px Inter, sans-serif';

  fragments = FRAGMENTS.map((text, i) => {
    // Place in a loose scatter, avoiding center
    const angle = (i / FRAGMENTS.length) * Math.PI * 2 + Math.random() * 0.8;
    const minDist = sphereR * 1.6;
    const maxDist = Math.min(W, H) * 0.46;
    const dist = minDist + Math.random() * (maxDist - minDist);

    return {
      text,
      x: CX + Math.cos(angle) * dist * (0.85 + Math.random() * 0.3) * (W / H > 1.4 ? 1.3 : 1),
      y: CY + Math.sin(angle) * dist * (0.85 + Math.random() * 0.3),
      // Each fragment has independent drift
      driftX: (Math.random() - 0.5) * 0.015,
      driftY: (Math.random() - 0.5) * 0.012,
      // Opacity cycle — each fragment breathes independently
      opacityBase: 0.12 + Math.random() * 0.55,
      opacityPhase: Math.random() * Math.PI * 2,
      opacitySpeed: 0.0003 + Math.random() * 0.0006,
      // Size
      fontSize: 11 + Math.random() * 5,
      fontWeight: Math.random() > 0.7 ? '400' : '300',
      // Blur state — 0 = sharp, 1 = fully dissolved
      blurPhase: Math.random() * Math.PI * 2,
      blurSpeed: 0.0002 + Math.random() * 0.0004,
      // Drift bounds
      baseX: 0, baseY: 0,
      driftRange: 18 + Math.random() * 22,
      driftPhaseX: Math.random() * Math.PI * 2,
      driftPhaseY: Math.random() * Math.PI * 2,
      driftSpeedX: 0.00015 + Math.random() * 0.0002,
      driftSpeedY: 0.00012 + Math.random() * 0.0002,
    };
  });

  // Store base positions
  fragments.forEach(f => {
    f.baseX = f.x;
    f.baseY = f.y;
  });
}

// ============================================
// DRAW SPHERE
// ============================================
function drawSphere() {
  // Outer glow — large, soft
  const glow1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, sphereR * 4.5);
  glow1.addColorStop(0, `rgba(255,252,240,0.06)`);
  glow1.addColorStop(0.4, `rgba(255,252,240,0.03)`);
  glow1.addColorStop(1, `rgba(255,252,240,0)`);
  ctx.fillStyle = glow1;
  ctx.beginPath();
  ctx.arc(CX, CY, sphereR * 4.5, 0, Math.PI * 2);
  ctx.fill();

  // Mid glow
  const glow2 = ctx.createRadialGradient(CX, CY, 0, CX, CY, sphereR * 2.2);
  glow2.addColorStop(0, `rgba(255,252,235,0.18)`);
  glow2.addColorStop(0.5, `rgba(255,252,235,0.08)`);
  glow2.addColorStop(1, `rgba(255,252,235,0)`);
  ctx.fillStyle = glow2;
  ctx.beginPath();
  ctx.arc(CX, CY, sphereR * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Core sphere
  const core = ctx.createRadialGradient(
    CX - sphereR * 0.2, CY - sphereR * 0.2, sphereR * 0.05,
    CX, CY, sphereR
  );
  core.addColorStop(0, `rgba(255,255,252,1)`);
  core.addColorStop(0.6, `rgba(255,252,240,0.97)`);
  core.addColorStop(1, `rgba(240,235,220,0.85)`);
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(CX, CY, sphereR, 0, Math.PI * 2);
  ctx.fill();

  // Inner label — "the source"
  ctx.save();
  ctx.font = `300 ${Math.round(sphereR * 0.22)}px Inter, sans-serif`;
  ctx.fillStyle = `rgba(60,55,45,0.55)`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('the source', CX, CY);
  ctx.restore();

  // Below sphere — "the human substrate / 1 of ~332 million"
  const labelY = CY + sphereR + 22;
  ctx.save();
  ctx.font = `300 ${Math.round(sphereR * 0.18)}px Inter, sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,0.22)`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('the human substrate', CX, labelY);
  ctx.font = `300 ${Math.round(sphereR * 0.13)}px DM Mono, monospace`;
  ctx.fillStyle = `rgba(255,255,255,0.12)`;
  ctx.fillText('1 of ~332 million', CX, labelY + sphereR * 0.22);
  ctx.restore();
}

// ============================================
// DRAW FRAGMENTS
// ============================================
function drawFragments() {
  fragments.forEach(f => {
    // Drift position
    const x = f.baseX + Math.sin(t * f.driftSpeedX + f.driftPhaseX) * f.driftRange;
    const y = f.baseY + Math.cos(t * f.driftSpeedY + f.driftPhaseY) * f.driftRange * 0.6;

    // Opacity pulse — breathes between dim and bright
    const opacityWave = Math.sin(t * f.opacitySpeed + f.opacityPhase);
    const opacity = f.opacityBase * (0.4 + 0.6 * (opacityWave * 0.5 + 0.5));

    // Blur — dissolve state cycles slowly
    const blurWave = Math.sin(t * f.blurSpeed + f.blurPhase);
    const blur = Math.max(0, blurWave * 3.5); // 0 to 3.5px blur

    if (opacity < 0.01) return;

    ctx.save();

    // Simulate blur with multiple passes at low opacity
    if (blur > 0.5) {
      const passes = 3;
      const offsets = [-blur * 0.5, 0, blur * 0.5];
      offsets.forEach(ox => {
        offsets.forEach(oy => {
          ctx.font = `${f.fontWeight} ${f.fontSize}px Inter, sans-serif`;
          ctx.fillStyle = `rgba(255,255,255,${opacity / (passes * passes) * 0.7})`;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(f.text, x + ox, y + oy);
        });
      });
    }

    // Sharp pass
    ctx.font = `${f.fontWeight} ${f.fontSize}px Inter, sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${opacity * (1 - blur / 7)})`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.text, x, y);

    ctx.restore();
  });
}

// ============================================
// ANIMATE
// ============================================
function draw() {
  t++;

  ctx.clearRect(0, 0, W, H);

  // Background — very deep, not pure black
  ctx.fillStyle = '#080807';
  ctx.fillRect(0, 0, W, H);

  drawFragments();
  drawSphere();

  animId = requestAnimationFrame(draw);
}

// ============================================
// ENTER
// ============================================
function enterLetter() {
  cancelAnimationFrame(animId);
  document.body.classList.add('exiting');
  setTimeout(() => {
    window.location.href = 'ths-letter.html';
  }, 1200);
}

// ============================================
// INIT
// ============================================
window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
