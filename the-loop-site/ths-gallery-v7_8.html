<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;

  /* ── MARK ── */

  }

  @keyframes fadeUp {

  /* ── Responsive — iPad and mobile ── */

    canvas#c {
      width: 100vw !important;
      height: 100vw !important;
      max-height: 520px;
      display: block;
      flex-shrink: 0;
    }
  }

  
  }


  
  /* ── TIMELINE SCRUBBER ── */
  #timeline {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;

  }
  #timeline-slider {
    -webkit-appearance: none;
    appearance: none;

  #timeline-slider::-webkit-slider-thumb {

  }
  #timeline-slider::-webkit-slider-thumb:hover {

  }
  #tl-label {
    font-size: 9px;

    letter-spacing: 4px;
    color: rgba(210,185,120,0.5);
    text-transform: uppercase;

  }
  #tl-left {
    font-size: 8px;

  }
  #tl-right {
    font-size: 8px;

  #still-btn {

  @media (max-width: 900px) {

    #timeline-slider { width: 200px; }

  #dividend-indicator {

  /* ── RAMS PLACARD ── */

<body>

<div id="app"><canvas id="c"></canvas>

<div id="mark">

</div>

  <div class="rams-line">A model of how extractive AI systems<br>must eventually close their economic loop.</div>

</div>

<div id="year">Year 0</div>

<div id="timeline">
  <span id="tl-left">2015</span>
  <input type="range" id="timeline-slider" min="0" max="200" value="0" step="1">
  <span id="tl-right">2044</span>

</div>

<div id="controls">
  <button class="btn" id="bp">Pause</button>
  <button class="btn" id="bs">Slow</button>
  <button class="btn active" id="bn">Normal</button>
  <button class="btn" id="bf">Fast</button>
  <button class="btn" id="br">Reset</button>
  <button class="btn" id="bm">Sound On</button>
</div>

<script>
// State — declared early so draw loop can reference them

// Global state — declared before draw loop
let scrubbing = false;
let frozenYear = null;

const c = document.getElementById('c');
const ctx = c.getContext('2d');
const yearEl = document.getElementById('year');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  c.width = Math.floor(window.innerWidth * dpr);
  c.height = Math.floor(window.innerHeight * dpr);
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

function project(x, y, z, cx, cy, rX, rY, scale) {
  const cosY = Math.cos(rY), sinY = Math.sin(rY);
  const cosX = Math.cos(rX), sinX = Math.sin(rX);
  const x1 = x * cosY + z * sinY;
  const z1 = -x * sinY + z * cosY;
  const y1 = y * cosX - z1 * sinX;
  const z2 = y * sinX + z1 * cosX;
  const fov = 6;
  const s = fov / (fov + z2 * 0.3);
  return [cx + x1 * scale * s, cy + y1 * scale * s, z2, s];
}

const R = 1.0, r = 0.36;
const SPIRAL_TOTAL = 1800, SP = 3, SQ = 7;
const spiralPts = [];
// Spiral density gradient: winding accelerates as extraction compounds,
// stabilizes as Dividend closes the loop.
for (let i = 0; i < SPIRAL_TOTAL; i++) {
  const frac = i / SPIRAL_TOTAL;
  // Compound curve: tightens through open loop, eases at Dividend
  const accel = frac < 0.5
    ? frac * frac * 4
    : 1 - (frac - 0.5) * (frac - 0.5) * 2;
  const tBase = frac * Math.PI * 2 * SQ;
  const tWarped = tBase * (1 + accel * 0.38);
  spiralPts.push([
    (R + r * Math.cos(tWarped * SP / SQ)) * Math.cos(tWarped),
    r * Math.sin(tWarped * SP / SQ),
    (R + r * Math.cos(tWarped * SP / SQ)) * Math.sin(tWarped)
  ]);
}

const TU = 48, TV = 24;
const rings = [];
for (let i = 0; i <= TU; i++) {
  const u = (i / TU) * Math.PI * 2;
  const ring = [];
  for (let j = 0; j <= TV; j++) {
    const v = (j / TV) * Math.PI * 2;
    ring.push([
      (R + r * Math.cos(v)) * Math.cos(u),
      r * Math.sin(v),
      (R + r * Math.cos(v)) * Math.sin(u)
    ]);
  }
  rings.push(ring);
}

const PCOUNT = 600;
let spiralProgress = 0;
const parts = [];
function resetP(p, shifted) {
  const isE = Math.random() > 0.5;
  const isI = shifted && Math.random() < 0.13;
  p.u = Math.random() * Math.PI * 2;
  // Migrate toward inner bore (v=π) as spiralProgress grows
  const bias = spiralProgress * spiralProgress;
  const spread = Math.PI * (0.55 - spiralProgress * 0.38);
  const goInner = Math.random() < bias;
  let baseV;
  if (goInner) { baseV = Math.PI + (Math.random()-0.5)*spread; }
  else { baseV = isE ? Math.random()*Math.PI : Math.PI+Math.random()*Math.PI; }
  p.v = baseV;
  p.life = 0;
  p.maxLife = 0.5 + Math.random() * 1.0;
  p.speed = 0.012 + Math.random() * 0.008;
  p.type = isI ? 'inflow' : isE ? 'extract' : 'return';
}
for (let i = 0; i < PCOUNT; i++) {
  const p = {};
  resetP(p, false);
  p.life = Math.random() * p.maxLife;
  parts.push(p);
}

let rotY = 0.5, rotX = 0.22;
let time = 0, speed = 1.0;
let paused = false, shifted = false, ringAlpha = 0;
let dividendProgress = 0;
let cloudTime = 0; // independent time for bore cloud — does not track rotation
let dragging = false, lastX = 0, lastY = 0;

const btns = {
  pause: document.getElementById('bp'),
  slow: document.getElementById('bs'),
  normal: document.getElementById('bn'),
  fast: document.getElementById('bf'),
  reset: document.getElementById('br')
};

function clearSpeed() {
  ['slow','normal','fast'].forEach(k => btns[k].classList.remove('active'));
}

btns.pause.addEventListener('click', function() {
  paused = !paused;
  if (!paused) { scrubbing = false; lastT = performance.now(); } // clear scrub lock on resume
  this.classList.toggle('active', paused);
  this.textContent = paused ? 'Resume' : 'Pause';
});
btns.slow.addEventListener('click', function() { speed = 0.25; clearSpeed(); this.classList.add('active'); });
btns.normal.addEventListener('click', function() { speed = 1.0; clearSpeed(); this.classList.add('active'); });
btns.fast.addEventListener('click', function() { speed = 4.0; clearSpeed(); this.classList.add('active'); });
btns.reset.addEventListener('click', () => {
  spiralProgress = 0; time = 0; shifted = false; ringAlpha = 0;
  yearEl.textContent = 'Year 0';
  parts.forEach(p => resetP(p, false));
});

c.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  rotY += (e.clientX - lastX) * 0.006;
  rotX += (e.clientY - lastY) * 0.004;
  rotX = Math.max(-0.7, Math.min(0.7, rotX));
  lastX = e.clientX; lastY = e.clientY;
});

// Touch support for iPad and mobile
c.addEventListener('touchstart', e => {
  e.preventDefault();
  dragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchend', () => dragging = false);
window.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragging) return;
  const tx = e.touches[0].clientX;
  const ty = e.touches[0].clientY;
  rotY += (tx - lastX) * 0.006;
  rotX += (ty - lastY) * 0.004;
  rotX = Math.max(-0.7, Math.min(0.7, rotX));
  lastX = tx; lastY = ty;
}, { passive: false });

let lastT = performance.now();

requestAnimationFrame(draw); // kick off loop

function draw(ts) {
  const raw = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  const dt = paused ? 0 : raw * speed;
  time += dt;
  cloudTime += dt * 0.18; // cloud breathes much slower than the spiral rotates

  const W = window.innerWidth, H = window.innerHeight;
  // Torus sits left of center to give panel room
  const scale = Math.min(W, H) * 0.30;
  const narrow = W < 900;
  const cx = narrow ? W * 0.50 : W * 0.38;
  const cy = narrow ? Math.min(H * 0.42, 260) : H * 0.50;

  if (!paused) {
    rotY += dt * 0.055;
    spiralProgress = Math.min(2.9, spiralProgress + dt * 0.0025); // runs to 2044
    // Dividend phase — activates when slider goes past Year 10
    const dpSource = (scrubbing && frozenYear !== null)
      ? sliderToProgress(frozenYear)
      : spiralProgress;
    const dividendActive = dpSource >= 1.0;
    dividendProgress = dividendActive
      ? Math.min(1, (dpSource - 1.0) / 0.4) // fully saturated by ~2033
      : 0;

    // Year label — four Dividend phases
    if (dividendActive) {
      const yr = 2025 + Math.round((spiralProgress - 1.0) / 1.9 * 19);
      const dp = dividendProgress;
      // Four phases across the Dividend arc
      // Phase 1: Provenance (dp 0–0.25, ~2025-2030)
      // Phase 2: Accounting (dp 0.25–0.5, ~2030-2035)
      // Phase 3: License (dp 0.5–0.75, ~2035-2040)
      // Phase 4: Inference (dp 0.75–1.0, ~2040-2044)
      let phase = '';
      if (dp < 0.25) phase = 'Provenance';
      else if (dp < 0.5) phase = 'Accounting';
      else if (dp < 0.75) phase = 'License';
      else phase = 'Inference';
      yearEl.textContent = phase + ' · ' + Math.min(yr, 2044);
    } else if (spiralProgress >= 0.99) {
      yearEl.textContent = '2025 · The Loop Is Open';
    } else {
      yearEl.textContent = 'Year ' + Math.floor(spiralProgress * 10) + ' · ' + (2015 + Math.floor(spiralProgress * 10));
    }

    if (spiralProgress >= 0.35 && !shifted) {
      shifted = true;
      ringAlpha = 0.85;
    }
    if (ringAlpha > 0) ringAlpha = Math.max(0, ringAlpha - dt * 0.4);

    parts.forEach(p => {
      p.life += dt * 0.6;
      if (p.life > p.maxLife) resetP(p, shifted);

      // At Dividend closure: particles shift from inward extraction to
      // surface circulation — centripetal → tangential
      const circ = dividendProgress; // 0 = extraction behavior, 1 = circulation

      if (p.type === 'extract') {
        // During open loop: pulls inward toward bore
        // During Dividend: redirects to surface flow along u axis
        const inwardV = p.speed * 0.8;
        const tangentialV = p.speed * 0.15;
        p.u += p.speed * 2.5;
        p.v += inwardV * (1 - circ) + tangentialV * circ;
      }
      else if (p.type === 'return') {
        const inwardV = p.speed * 1.0;
        const tangentialV = p.speed * 0.15;
        p.u -= p.speed * 2.5;
        p.v -= inwardV * (1 - circ) - tangentialV * circ;
      }
      else {
        p.u += p.speed;
        p.v += p.speed * 3 * (1 - circ * 0.7);
      }
    });
  }

  ctx.fillStyle = '#050504';
  ctx.fillRect(0, 0, W, H);

  // Horizon disk plane removed — orientation is read from the torus geometry itself

  // Longitude lines
  for (let j = 0; j < TV; j += 3) {
    ctx.beginPath(); let first = true;
    for (let i = 0; i <= TU; i++) {
      const [x3,y3,z3] = rings[i % TU][j];
      const [x,y] = project(x3,y3,z3,cx,cy,rotX,rotY,scale);
      if (first) { ctx.moveTo(x,y); first = false; } else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba(95,90,72,0.22)';
    ctx.lineWidth = 0.45; ctx.stroke();
  }

  // Torus skin — translucent surface, hue derived from position in system
  // Drawn as filled quads between adjacent latitude rings
  for (let i = 0; i < TU; i++) {
    const ni = (i + 1) % TU;
    const u = (i / TU) * Math.PI * 2;
    const su = Math.sin(u);
    // Hue by zone: gold=extraction arc, blue=return arc, neutral=transition
    let r, g, b;
    if (su > 0.3) {
      // Extraction arc — gold
      const t = Math.min(1, (su - 0.3) / 0.7);
      r = Math.floor(200 + t * 30);
      g = Math.floor(155 + t * 15);
      b = Math.floor(55 + t * 10);
    } else if (su < -0.3) {
      // Return arc — blue, intensifies when Dividend activates
      const t = Math.min(1, (-su - 0.3) / 0.7);
      const dp = dividendProgress;
      r = Math.floor(90 + t * 20 - dp * 30);
      g = Math.floor(135 + t * 25 + dp * 20);
      b = Math.floor(185 + t * 30 + dp * 55);
    } else {
      // Neutral transition — warm grey, shifts cooler during Dividend
      const dp = dividendProgress;
      r = Math.floor(130 - dp * 20);
      g = Math.floor(122 - dp * 5);
      b = Math.floor(108 + dp * 30);
    }
    for (let j = 0; j < TV; j++) {
      const nj = (j + 1) % TV;
      const p0 = rings[i][j],   p1 = rings[ni][j];
      const p2 = rings[ni][nj], p3 = rings[i][nj];
      const [ax,ay,az] = project(p0[0],p0[1],p0[2],cx,cy,rotX,rotY,scale);
      const [bx,by]    = project(p1[0],p1[1],p1[2],cx,cy,rotX,rotY,scale);
      const [cx2,cy2]  = project(p2[0],p2[1],p2[2],cx,cy,rotX,rotY,scale);
      const [dx,dy]    = project(p3[0],p3[1],p3[2],cx,cy,rotX,rotY,scale);
      // Backface cull
      const crossZ = (bx-ax)*(dy-ay) - (by-ay)*(dx-ax);
      if (crossZ > 0) continue;
      // Depth fade — faces closer to viewer slightly brighter
      const depthFade = Math.max(0, (az + 2.5) / 5.5);
      // Inner bore glows warmer as vortex forms
      const vMid = (j / TV) * Math.PI * 2;
      const distBore = Math.abs(vMid - Math.PI) / Math.PI;
      const boreGlow = spiralProgress * Math.max(0, 1 - distBore * 2.5);
      const dp = dividendProgress;
      // During Dividend: bore shifts from warm white to cool resonant blue-white
      const resonance = dp * Math.max(0, 1 - distBore * 2.0);
      const alpha = (0.07 + boreGlow * 0.06 + resonance * 0.12) * depthFade;
      const fr = Math.floor(Math.min(255, r + boreGlow * 40 - resonance * 20));
      const fg = Math.floor(Math.min(255, g + boreGlow * 30 + resonance * 15));
      const fb = Math.floor(Math.min(255, b + boreGlow * 10 + resonance * 60));
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
      ctx.lineTo(cx2,cy2); ctx.lineTo(dx,dy);
      ctx.closePath();
      ctx.fillStyle = `rgba(${fr},${fg},${fb},${alpha})`;
      ctx.fill();
    }
  }

  // Latitude rings
  for (let i = 0; i < TU; i += 2) {
    const u = (i / TU) * Math.PI * 2;
    const ring = rings[i];
    let dAcc = 0, dCnt = 0;
    ctx.beginPath(); let first = true;
    for (let j = 0; j <= TV; j++) {
      const [x3,y3,z3] = ring[j % TV];
      const [x,y,z] = project(x3,y3,z3,cx,cy,rotX,rotY,scale);
      dAcc += z; dCnt++;
      if (first) { ctx.moveTo(x,y); first = false; } else ctx.lineTo(x,y);
    }
    const depth = 0.05 + ((dAcc/dCnt + 2) / 6) * 0.13;
    const su = Math.sin(u);
    if (su > 0.55) ctx.strokeStyle = `rgba(210,162,65,${depth * 1.6})`;
    else if (su < -0.55) ctx.strokeStyle = `rgba(130,160,190,${depth * 1.4})`;
    else ctx.strokeStyle = `rgba(90,86,75,${depth * 1.1})`;
    ctx.lineWidth = 0.7; ctx.stroke();
  }

  // Inner wall fill — soft white volume on the bore
  const jI = Math.floor(TV * 0.5);
  for (let i = 0; i < TU; i++) {
    const ni = (i+1) % TU;
    const p0 = rings[i][jI], p1 = rings[ni][jI];
    const p2 = rings[ni][jI+1], p3 = rings[i][jI+1];
    const [ax,ay] = project(p0[0],p0[1],p0[2],cx,cy,rotX,rotY,scale);
    const [bx,by] = project(p1[0],p1[1],p1[2],cx,cy,rotX,rotY,scale);
    const [cx2,cy2] = project(p2[0],p2[1],p2[2],cx,cy,rotX,rotY,scale);
    const [dx,dy] = project(p3[0],p3[1],p3[2],cx,cy,rotX,rotY,scale);
    const crossZ = (bx-ax)*(dy-ay) - (by-ay)*(dx-ax);
    if (crossZ < 0) {
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx2,cy2); ctx.lineTo(dx,dy);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fill();
    }
  }

  // Hourglass glow — builds on inner bore as vortex forms
  // During Dividend: shifts from warm gold to cool resonant blue-white and blooms
  if (spiralProgress > 0.12) {
    const gi = Math.pow((spiralProgress-0.12)/0.88, 1.5);
    const dp2 = dividendProgress;

    // Collect bore ring points to find projected center
    let boreCX = 0, boreCY = 0, borePts = [];
    for (let i = 0; i < TU; i++) {
      const pt = rings[i][jI];
      const [gx,gy,gz] = project(pt[0],pt[1],pt[2],cx,cy,rotX,rotY,scale);
      borePts.push([gx,gy,gz]);
      boreCX += gx; boreCY += gy;
    }
    boreCX /= TU; boreCY /= TU;

    // Per-point glow — warm gold fading to cool blue as dividend rises
    for (let i = 0; i < TU; i++) {
      const [gx,gy,gz] = borePts[i];
      if (gz > -1.0) {
        const df = Math.max(0,(gz+2)/4.5);
        const gr = (6 + gi*22) * (1 + dp2 * 1.8);
        const gg = ctx.createRadialGradient(gx,gy,0,gx,gy,gr);
        const warmR = Math.floor(225 - dp2*80);
        const warmG = Math.floor(200 - dp2*40);
        const warmB = Math.floor(145 + dp2*110);
        const alpha = (gi*df*0.22) * (1 - dp2*0.4);
        gg.addColorStop(0,`rgba(${warmR},${warmG},${warmB},${alpha})`);
        gg.addColorStop(1,`rgba(${warmR-20},${warmG-20},${warmB},0)`);
        ctx.beginPath(); ctx.arc(gx,gy,gr,0,Math.PI*2);
        ctx.fillStyle = gg; ctx.fill();
      }
    }

    // BLOOM — the bore cloud at full Dividend
    // Three layers breathing independently — each its own life
    // The cloud does NOT track the spiral rotation — it is the field, not the structure
    if (dp2 > 0.05) {
      const bloom = Math.pow(dp2, 1.4);

      // Each layer has its own slow independent rhythm via cloudTime
      // Core: deepest, slowest breath — almost still
      const corePulse = 1 + Math.sin(cloudTime * 0.7) * 0.06;
      const coreR = (18 + bloom * 110) * corePulse;
      // Core drifts very slightly — independent of torus rotation
      const coreDX = Math.sin(cloudTime * 0.3) * bloom * 8;
      const coreDY = Math.cos(cloudTime * 0.23) * bloom * 5;
      const core = ctx.createRadialGradient(
        boreCX + coreDX, boreCY + coreDY, 0,
        boreCX + coreDX, boreCY + coreDY, coreR
      );
      core.addColorStop(0, `rgba(210,230,255,${bloom*0.38})`);
      core.addColorStop(0.35, `rgba(180,210,255,${bloom*0.22})`);
      core.addColorStop(0.7, `rgba(140,180,240,${bloom*0.10})`);
      core.addColorStop(1, 'rgba(100,150,220,0)');
      ctx.beginPath(); ctx.arc(boreCX + coreDX, boreCY + coreDY, coreR, 0, Math.PI*2);
      ctx.fillStyle = core; ctx.fill();

      // Halo: medium drift, own rotation offset — the Mie scattering layer
      const haloPulse = 1 + Math.sin(cloudTime * 0.41 + 1.2) * 0.09;
      const haloR = (45 + bloom * 200) * haloPulse;
      const haloDX = Math.sin(cloudTime * 0.19 + 2.1) * bloom * 18;
      const haloDY = Math.cos(cloudTime * 0.15 + 0.8) * bloom * 12;
      const halo = ctx.createRadialGradient(
        boreCX + haloDX, boreCY + haloDY, 0,
        boreCX + haloDX, boreCY + haloDY, haloR
      );
      halo.addColorStop(0, `rgba(180,210,255,${bloom*0.14})`);
      halo.addColorStop(0.4, `rgba(160,200,255,${bloom*0.08})`);
      halo.addColorStop(1, 'rgba(120,170,240,0)');
      ctx.beginPath(); ctx.arc(boreCX + haloDX, boreCY + haloDY, haloR, 0, Math.PI*2);
      ctx.fillStyle = halo; ctx.fill();

      // Eye: outermost breath — most independent, longest cycle
      // Expands and contracts on its own, barely connected to the torus at all
      if (dp2 > 0.85) {
        const eyeBloom = (dp2 - 0.85) / 0.15;
        const eyePulse = 1 + Math.sin(cloudTime * 0.22 + 3.7) * 0.13;

        const eyeDX = Math.sin(cloudTime * 0.11 + 1.5) * bloom * 28;
        const eyeDY = Math.cos(cloudTime * 0.09 + 4.2) * bloom * 18;
        const eye = ctx.createRadialGradient(
          boreCX + eyeDX, boreCY + eyeDY, 0,

        eye.addColorStop(0, `rgba(200,225,255,${eyeBloom*0.09})`);

        ctx.beginPath(); ctx.arc(boreCX + eyeDX, boreCY + eyeDY, eyeR, 0, Math.PI*2);

    }
  }

  // Spiral
  const steps = Math.floor(spiralProgress * SPIRAL_TOTAL);
  if (steps > 2) {
    const proj = spiralPts.slice(0, steps).map(([x3,y3,z3]) =>
      project(x3,y3,z3,cx,cy,rotX,rotY,scale)

    for (let i = 1; i < proj.length; i++) {
      const [x,y,z] = proj[i];
      const [px,py] = proj[i-1];
      const age = i / proj.length;
      const df = Math.max(0.1, (z + 2.5) / 5.5);

      const b = Math.floor(158 + age * 90);

    const [tx,ty] = proj[proj.length-1];
    const g = ctx.createRadialGradient(tx,ty,0,tx,ty,18);

  }

  // Particles — density grows with spiral progress

  parts.slice(0, Math.min(activeParts, PCOUNT)).forEach(p => {
    const vv = p.v % (Math.PI * 2);
    const x3 = (R + r * Math.cos(vv)) * Math.cos(p.u);
    const y3 = r * Math.sin(vv);
    const z3 = (R + r * Math.cos(vv)) * Math.sin(p.u);

  const ANN_FADE = 0.012; // faster dissolve in/out

      ctx.font = `300 ${heroSize}px Inter, sans-serif`;
      ctx.fillStyle = `rgba(175,185,205,${Math.min(heroAlpha, 0.52)})`;
      ctx.textAlign = 'center';
      ctx.fillText('If this structure is correct, the loop cannot remain open.', cx, titleY + titleSize * 1.55);
    }

    // Forecast line — fades in later, below hero
    if (dividendProgress > 0.35) {
      const subAlpha = Math.pow((dividendProgress - 0.35) / 0.65, 2.0) * 0.30;
      const subSize = Math.max(6, Math.floor(scale * 0.036));
      ctx.font = `300 ${subSize}px Inter, sans-serif`;
      ctx.fillStyle = `rgba(140,155,180,${subAlpha})`;
      ctx.textAlign = 'center';
      ctx.fillText('A closed economic loop will eventually be required.', cx, titleY + titleSize * 1.55 + Math.max(6, Math.floor(scale * 0.040)) * 2.4);
    }
    ctx.restore();
  }

  requestAnimationFrame(draw);
}


// ── Timeline scrubber ──
const slider = document.getElementById('timeline-slider');
const tlLabel = document.getElementById('tl-label');
// Map slider 0-100 → spiralProgress 0→1.2 (0-10 years + future)
function sliderToProgress(v) {
  if (v <= 100) return v / 100; // 0-100 → spiralProgress 0-1.0 (2015-2025)
  return 1.0 + (v - 100) / 100 * 1.9; // 100-200 → 1.0-2.9 (2025-2044)
}
function progressToYear(p) {
  // 0 = 2015, 1.0 = 2025 (10 years), 1.2 = 2027+
  const yr = Math.floor(p * 10);
  if (p >= 1.0) return '20' + (15 + Math.floor(p * 10));
  return String(2015 + Math.floor(p * 10));
}
function progressToLabel(p) {
  if (p <= 0.02) return 'Year 0 · 2015';
  if (p >= 1.0) {
    const yr = 2025 + Math.round((p - 1.0) / 1.9 * 19);
    const dp = Math.min(1, (p - 1.0) / 0.4);
    let phase = '';
    if (dp < 0.25) phase = 'Provenance';
    else if (dp < 0.5) phase = 'Accounting';
    else if (dp < 0.75) phase = 'License';
    else phase = 'Inference';
    return phase + ' · ' + Math.min(yr, 2044);
  }
  const yr = 2015 + Math.floor(p * 10);
  return 'Year ' + Math.floor(p * 10) + ' · ' + yr;
}

slider.addEventListener('input', () => {
  scrubbing = true;
  frozenYear = parseFloat(slider.value);
  const prog = sliderToProgress(frozenYear);
  spiralProgress = Math.min(prog, 1.0);
  tlLabel.textContent = progressToLabel(prog);
  yearEl.textContent = progressToLabel(prog);
  // Sync particle state
  if (spiralProgress >= 0.35 && !shifted) {
    shifted = true; ringAlpha = 0.85;
  }
  paused = true;
  document.getElementById('bp').textContent = 'Play';
  document.getElementById('bp').classList.remove('active');
});

// ── Procedural ambient audio — Glass-inspired ──
// D minor / F major arpeggios, slow cycling, long sustain, sparse voicing
// Entirely generated via Web Audio API — no external files, no copyright

let audioCtx = null;
let audioMuted = true;
let audioRunning = false;
let masterGain = null;
let reverbNode = null;

function buildReverb(ctx, duration = 3.5, decay = 2.2) {
  const sr = ctx.sampleRate;
  const len = sr * duration;
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function playTone(freq, startTime, duration, gainPeak = 0.06, detune = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, startTime);
  osc.detune.setValueAtTime(detune, startTime);

  const attack = 0.8, release = duration * 0.55;
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(gainPeak, startTime + attack);
  env.gain.setValueAtTime(gainPeak, startTime + duration - release);
  env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

  osc.connect(env);
  env.connect(reverbNode);
  env.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.1);
}

// Harmonic series — Glass uses simple triadic arpeggios, modal shifts
// D minor: D3 F3 A3 C4 D4 F4 A4
// F major:  F3 A3 C4 F4
// Bb major: Bb2 D3 F3 Bb3
const NOTE = {
  Bb2: 116.54, C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61,
  G3: 196.00, A3: 220.00, Bb3: 233.08, C4: 261.63, D4: 293.66,
  E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, C5: 523.25
};

// Patterns — each is an array of [freq, duration, gain] triplets
// They overlap and drift, creating Glass-like layering
const PATTERNS = [
  // Pattern A — slow D minor arpeggio, foundational
  [
    [NOTE.D3, 4.2, 0.055], [NOTE.F3, 3.8, 0.048], [NOTE.A3, 4.5, 0.052],
    [NOTE.C4, 3.6, 0.044], [NOTE.D4, 5.0, 0.058], [NOTE.A3, 3.2, 0.040],
    [NOTE.F3, 4.8, 0.046],
  ],
  // Pattern B — sustained pad notes, slower
  [
    [NOTE.D3, 8.5, 0.035], [NOTE.A3, 7.2, 0.032], [NOTE.F3, 9.0, 0.030],
    [NOTE.C4, 6.8, 0.028],
  ],
  // Pattern C — upper register, very sparse, bright
  [
    [NOTE.D4, 5.5, 0.025], [NOTE.F4, 4.2, 0.022], [NOTE.A4, 3.8, 0.018],
    [NOTE.C5, 6.0, 0.020],
  ],
  // Pattern D — modal shift to Bb, appears mid-cycle
  [
    [NOTE.Bb2, 6.0, 0.040], [NOTE.D3, 4.5, 0.038], [NOTE.F3, 5.2, 0.035],
    [NOTE.Bb3, 7.0, 0.032],
  ],
];

function schedulePattern(patternIdx, baseTime, cycleOffset) {
  if (!audioCtx) return 0;
  const pat = PATTERNS[patternIdx % PATTERNS.length];
  let t = baseTime + cycleOffset;
  const gap = 0.4 + Math.random() * 0.6;
  pat.forEach(([freq, dur, gain]) => {
    playTone(freq, t, dur, gain, (Math.random() - 0.5) * 4);
    t += dur * 0.62 + gap;
  });
  return t - baseTime;
}

let audioScheduler = null;
let audioPhase = 0;

function startAudioEngine() {
  if (audioRunning) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.75, audioCtx.currentTime + 5.0);

  reverbNode = buildReverb(audioCtx);
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.setValueAtTime(0.50, audioCtx.currentTime);
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  audioRunning = true;

  // Resume context in case browser started it suspended
  audioCtx.resume().then(() => {
    function scheduleCycle() {
      if (!audioRunning || !audioCtx) return;
      const now = audioCtx.currentTime;
      schedulePattern(0, now, 0);
      schedulePattern(1, now, 2.8);
      schedulePattern(3, now, 5.5);
      if (audioPhase > 1) schedulePattern(2, now, 8.2);
      audioPhase++;
      const cycleDur = 36 + Math.random() * 6;
      audioScheduler = setTimeout(scheduleCycle, (cycleDur - 4) * 1000);
    }
    scheduleCycle();
  });
}

function stopAudioEngine() {
  if (!audioRunning) return;
  if (audioScheduler) clearTimeout(audioScheduler);
  if (masterGain && audioCtx) {
    masterGain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 2.5);
    setTimeout(() => {
      try { audioCtx.close(); } catch(e) {}
      audioCtx = null; masterGain = null; reverbNode = null;
    }, 3000);
  }
  audioRunning = false;
}

// Sound button
const bmBtn = document.getElementById('bm');
bmBtn.addEventListener('click', function() {
  audioMuted = !audioMuted;
  if (!audioMuted) {
    this.textContent = 'Mute';
    this.classList.add('active');
    startAudioEngine(); // audioMuted is now false — engine will schedule tones
  } else {
    this.textContent = 'Sound On';
    this.classList.remove('active');
    stopAudioEngine();
  }
});

// Pause syncs audio — note: by this point btns.pause listener has already toggled `paused`
// so we read the NEW value of paused to decide whether to suspend or resume
btns.pause.addEventListener('click', function() {
  if (audioCtx && audioRunning) {
    // paused has already been toggled by the first listener
    if (paused) {
      audioCtx.suspend(); // animation just paused → suspend audio
    } else {
      audioCtx.resume();  // animation just resumed → resume audio
    }
  }
});
