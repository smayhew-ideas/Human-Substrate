<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Human Substrate — Toroidal Growth System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080807; overflow: hidden; font-family: Georgia, serif; }
  #c { display: block; }
  #ui { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  #label-top { position: absolute; top: 28px; left: 40px; font-size: 9px; letter-spacing: 4px; color: #3A3830; font-family: 'Courier New', monospace; text-transform: uppercase; }
  #title { position: absolute; top: 46px; left: 40px; font-size: 20px; color: #D8D4CC; line-height: 1.4; }
  #year { position: absolute; top: 28px; right: 40px; font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 4px; color: #4A4640; }
  #phase { position: absolute; top: 46px; right: 40px; font-size: 13px; color: #C8963C; text-align: right; opacity: 0; transition: opacity 1s; font-style: italic; }
  #desc { position: absolute; bottom: 72px; left: 40px; max-width: 280px; font-size: 11px; color: #5A5650; font-style: italic; line-height: 1.9; }
  #legend { position: absolute; bottom: 72px; right: 40px; text-align: right; }
  .li { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 8px; }
  .ld { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ll { font-size: 8px; letter-spacing: 3px; color: #3A3830; font-family: 'Courier New', monospace; text-transform: uppercase; }
  #controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; pointer-events: all; }
  .btn { background: none; border: 1px solid #1E1C18; color: #3A3830; font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 3px; padding: 7px 14px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
  .btn:hover { border-color: #4A4640; color: #B0ACA4; }
  .btn.active { border-color: #C8963C; color: #C8963C; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="label-top">Human Substrate Project · THS</div>
  <div id="title">The<br>Toroidal<br>Growth<br>System</div>
  <div id="year">YEAR 0</div>
  <div id="phase"></div>
  <div id="desc">The torus is the field.<br>The spiral is what the system traces<br>through it over time.<br>Never returning to the same point.<br>Always at a higher register.</div>
  <div id="legend">
    <div class="li"><span class="ll">Extraction arc</span><div class="ld" style="background:#C8963C"></div></div>
    <div class="li"><span class="ll">Return arc · Dividend</span><div class="ld" style="background:#8BAABF"></div></div>
    <div class="li"><span class="ll">Spiral path · growth</span><div class="ld" style="background:#C8C4BC;opacity:.5"></div></div>
    <div class="li"><span class="ll">Net inflow · new knowledge</span><div class="ld" style="background:#7A9060"></div></div>
  </div>
  <div id="controls">
    <button class="btn" id="bp">Pause</button>
    <button class="btn" id="bs">Slow</button>
    <button class="btn active" id="bn">Normal</button>
    <button class="btn" id="bf">Fast</button>
    <button class="btn" id="br">Reset</button>
  </div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function resize() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── TORUS PROJECTION ─────────────────────────────────────
// Project a 3D torus onto 2D using simple perspective
function torusPoint3D(u, v, R, r) {
  const x = (R + r * Math.cos(v)) * Math.cos(u);
  const y = r * Math.sin(v);
  const z = (R + r * Math.cos(u)) * Math.sin(u) * 0.1 + (R + r * Math.cos(v)) * Math.sin(u);
  return [x, y, z];
}

function project(x, y, z, cx, cy, rotX, rotY, scale) {
  // Rotate around Y
  const x1 = x * Math.cos(rotY) + z * Math.sin(rotY);
  const z1 = -x * Math.sin(rotY) + z * Math.cos(rotY);
  // Rotate around X
  const y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  const z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  // Perspective
  const fov = 6;
  const s = fov / (fov + z2 * 0.3);
  return [cx + x1 * scale * s, cy + y1 * scale * s, z2, s];
}

// ── SPIRAL POINTS ─────────────────────────────────────────
const R = 1.0, r = 0.36;
const SPIRAL_TOTAL = 1800;
const SPIRAL_P = 3, SPIRAL_Q = 7;
const spiralPts = [];

for (let i = 0; i < SPIRAL_TOTAL; i++) {
  const t = (i / SPIRAL_TOTAL) * Math.PI * 2 * SPIRAL_Q;
  const u = t;
  const v = t * (SPIRAL_P / SPIRAL_Q);
  const x = (R + r * Math.cos(v)) * Math.cos(u);
  const y = r * Math.sin(v);
  const z = (R + r * Math.cos(v)) * Math.sin(u);
  spiralPts.push([x, y, z]);
}

// ── TORUS WIREFRAME ───────────────────────────────────────
const TORUS_U = 48, TORUS_V = 24;
const torusRings = [];
for (let i = 0; i <= TORUS_U; i++) {
  const u = (i / TORUS_U) * Math.PI * 2;
  const ring = [];
  for (let j = 0; j <= TORUS_V; j++) {
    const v = (j / TORUS_V) * Math.PI * 2;
    const x = (R + r * Math.cos(v)) * Math.cos(u);
    const y = r * Math.sin(v);
    const z = (R + r * Math.cos(v)) * Math.sin(u);
    ring.push([x, y, z]);
  }
  torusRings.push(ring);
}

// ── PARTICLES ─────────────────────────────────────────────
const PCOUNT = 220;
const particles = [];

function resetParticle(p, phaseShiftDone) {
  const isExtract = Math.random() > 0.5;
  const isInflow = phaseShiftDone && Math.random() < 0.12;
  p.u = Math.random() * Math.PI * 2;
  p.v = isExtract ? Math.random() * Math.PI : Math.PI + Math.random() * Math.PI;
  p.life = 0;
  p.maxLife = 0.5 + Math.random() * 1.0;
  p.speed = 0.012 + Math.random() * 0.008;
  p.type = isInflow ? 'inflow' : isExtract ? 'extract' : 'return';
}

for (let i = 0; i < PCOUNT; i++) {
  const p = { u: 0, v: 0, life: Math.random(), maxLife: 1, speed: 0.01, type: 'extract' };
  resetParticle(p, false);
  p.life = Math.random() * p.maxLife;
  particles.push(p);
}

// ── STATE ─────────────────────────────────────────────────
let rotY = 0.5, rotX = 0.22;
let spiralProgress = 0;
let time = 0;
let speed = 1.0;
let paused = false;
let phaseShiftDone = false;
let phaseRingAlpha = 0;
let isDragging = false, lastX = 0, lastY = 0;

// Controls
document.getElementById('bp').addEventListener('click', function() {
  paused = !paused;
  this.classList.toggle('active', paused);
  this.textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('bs').addEventListener('click', function() {
  speed = 0.25;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
});
document.getElementById('bn').addEventListener('click', function() {
  speed = 1.0;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
});
document.getElementById('bf').addEventListener('click', function() {
  speed = 4.0;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
});
document.getElementById('br').addEventListener('click', () => {
  spiralProgress = 0; time = 0; phaseShiftDone = false; phaseRingAlpha = 0;
  document.getElementById('year').textContent = 'YEAR 0';
  document.getElementById('phase').style.opacity = '0';
  particles.forEach(p => resetParticle(p, false));
});

c.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
c.addEventListener('mouseup', () => isDragging = false);
c.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - lastX) * 0.006;
  rotX += (e.clientY - lastY) * 0.004;
  rotX = Math.max(-0.5, Math.min(0.5, rotX));
  lastX = e.clientX; lastY = e.clientY;
});

// ── RENDER ─────────────────────────────────────────────────
let lastT = 0;

function draw(ts) {
  requestAnimationFrame(draw);
  const raw = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  const dt = paused ? 0 : raw * speed;
  time += dt;

  const W = c.width, H = c.height;
  const scale = Math.min(W, H) * 0.28;
  const cx = W * 0.5, cy = H * 0.5;

  // Update
  if (!paused) {
    rotY += dt * 0.07;
    spiralProgress = Math.min(1.0, spiralProgress + dt * 0.007);
    document.getElementById('year').textContent = `YEAR ${Math.floor(spiralProgress * 10)}`;

    if (spiralProgress >= 0.35 && !phaseShiftDone) {
      phaseShiftDone = true;
      phaseRingAlpha = 0.8;
      const el = document.getElementById('phase');
      el.textContent = 'The naming event.';
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 3500);
    }
    if (phaseRingAlpha > 0) phaseRingAlpha -= dt * 0.5;

    particles.forEach(p => {
      p.life += dt * 0.6;
      if (p.life > p.maxLife) resetParticle(p, phaseShiftDone);
      if (p.type === 'extract') { p.u += p.speed * 2.5; p.v += p.speed * 0.8; }
      else if (p.type === 'return') { p.u -= p.speed * 2.5; p.v -= p.speed * 1.0; }
      else { p.u += p.speed; p.v += p.speed * 3; }
    });
  }

  // Clear
  ctx.fillStyle = '#080807';
  ctx.fillRect(0, 0, W, H);

  // ── Draw torus wireframe ──
  // Sort rings by depth
  const ringData = torusRings.map((ring, i) => {
    const u = (i / TORUS_U) * Math.PI * 2;
    const cx3 = Math.cos(u) * R;
    const cz3 = Math.sin(u) * R;
    const [,,zd] = project(cx3, 0, cz3, cx, cy, rotX, rotY, scale);
    return { ring, zd, u };
  }).sort((a, b) => b.zd - a.zd);

  // Draw longitude lines (around tube)
  for (let j = 0; j < TORUS_V; j += 3) {
    ctx.beginPath();
    let first = true;
    for (let i = 0; i <= TORUS_U; i++) {
      const [px3, py3, pz3] = torusRings[i % TORUS_U][j];
      const [px, py, pz, ps] = project(px3, py3, pz3, cx, cy, rotX, rotY, scale);
      const alpha = Math.max(0.03, (pz + 2) / 5 * 0.08);
      if (first) { ctx.moveTo(px, py); first = false; }
      else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = `rgba(60,56,48,${0.12})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw latitude rings with gold/silver coloring
  for (let i = 0; i < TORUS_U; i += 2) {
    const u = (i / TORUS_U) * Math.PI * 2;
    const ring = torusRings[i];
    ctx.beginPath();
    let first = true;
    for (let j = 0; j <= TORUS_V; j++) {
      const [px3, py3, pz3] = ring[j % TORUS_V];
      const [px, py, pz, ps] = project(px3, py3, pz3, cx, cy, rotX, rotY, scale);
      if (first) { ctx.moveTo(px, py); first = false; }
      else ctx.lineTo(px, py);
    }
    // Color by angle — gold on extraction (top/outer), silver on return (inner/bottom)
    const ux = Math.cos(u + rotY);
    const isGold = py3 > 0; // simplified: top half gold, bottom silver
    const depth = 0.06 + (torusRings[i][0][2] + 2) / 6 * 0.08;
    if (Math.sin(u) > 0.6) {
      ctx.strokeStyle = `rgba(200,150,60,${depth * 1.2})`;
    } else if (Math.sin(u) < -0.6) {
      ctx.strokeStyle = `rgba(139,170,191,${depth * 1.0})`;
    } else {
      ctx.strokeStyle = `rgba(50,46,40,${depth * 0.8})`;
    }
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // ── Draw spiral trail ──
  const stepsToShow = Math.floor(spiralProgress * SPIRAL_TOTAL);
  if (stepsToShow > 2) {
    // Project all visible spiral points
    const projected = [];
    for (let i = 0; i < stepsToShow; i++) {
      const [px3, py3, pz3] = spiralPts[i];
      projected.push(project(px3, py3, pz3, cx, cy, rotX, rotY, scale));
    }

    // Draw in segments with depth-based opacity
    for (let i = 1; i < projected.length; i++) {
      const [px, py, pz] = projected[i];
      const [ppx, ppy] = projected[i-1];
      const age = i / stepsToShow;
      const depthFade = Math.max(0.1, (pz + 2.5) / 5.5);
      const alpha = age * 0.5 * depthFade;
      const brightness = Math.floor(160 + age * 80);
      ctx.beginPath();
      ctx.moveTo(ppx, ppy);
      ctx.lineTo(px, py);
      ctx.strokeStyle = `rgba(${brightness},${brightness-4},${brightness-10},${alpha})`;
      ctx.lineWidth = age > 0.85 ? 2.0 : 1.0;
      ctx.stroke();
    }

    // Tip dot
    const [tipX, tipY] = projected[projected.length - 1];
    ctx.beginPath();
    ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(240,236,220,0.9)';
    ctx.fill();
    // Tip glow
    const grad = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 12);
    grad.addColorStop(0, 'rgba(240,236,220,0.3)');
    grad.addColorStop(1, 'rgba(240,236,220,0)');
    ctx.beginPath();
    ctx.arc(tipX, tipY, 12, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // ── Phase shift ring ──
  if (phaseRingAlpha > 0) {
    for (let i = 0; i < TORUS_U; i += 1) {
      const u = (i / TORUS_U) * Math.PI * 2;
      const [px3, py3, pz3] = torusRings[i][0];
      const [px, py] = project(px3, py3, pz3, cx, cy, rotX, rotY, scale);
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(120,160,90,${phaseRingAlpha * 0.8})`;
      ctx.fill();
    }
  }

  // ── Draw particles ──
  particles.forEach(p => {
    const vv = p.v % (Math.PI * 2);
    const px3 = (R + r * Math.cos(vv)) * Math.cos(p.u);
    const py3 = r * Math.sin(vv);
    const pz3 = (R + r * Math.cos(vv)) * Math.sin(p.u);
    const [px, py, pz, ps] = project(px3, py3, pz3, cx, cy, rotX, rotY, scale);

    const fadeIn = Math.min(p.life / 0.2, 1);
    const fadeOut = 1 - Math.max((p.life - (p.maxLife - 0.25)) / 0.25, 0);
    const alpha = fadeIn * fadeOut * Math.max(0.1, (pz + 2.5) / 5.5) * 0.75;
    const sz = (1.5 + ps * 1.5);

    let color;
    if (p.type === 'extract') color = `rgba(200,150,60,${alpha})`;
    else if (p.type === 'return') color = `rgba(100,140,180,${alpha})`;
    else color = `rgba(110,150,90,${alpha})`;

    ctx.beginPath();
    ctx.arc(px, py, sz, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });
}

requestAnimationFrame(draw);
</script>
</body>
</html>
